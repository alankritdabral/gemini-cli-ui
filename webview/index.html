<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src {{cspSource}} https: data:; style-src {{cspSource}} 'unsafe-inline'; font-src {{cspSource}}; script-src 'nonce-{{nonce}}';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link nonce="{{nonce}}" rel="stylesheet" href="{{xtermCssUri}}" />
    <link nonce="{{nonce}}" rel="stylesheet" href="{{stylesUri}}" />
    <title>Gemini CLI UI</title>
  </head>
  <body data-platform="{{platform}}">
    <main class="terminal-shell">
      <div class="toolbar" role="toolbar" aria-label="Gemini CLI controls">
        <div class="status" id="statusContainer">
          <span class="status-dot" aria-hidden="true"></span>
          <div class="spinner" aria-hidden="true"></div>
          <span id="statusText">Starting Gemini CLI</span>
        </div>
        <div class="actions">
          <button id="browserButton" type="button" title="Switch to Gemini Browser" class="icon-only-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="18" rx="2" ry="2"></rect>
              <line x1="2" y1="9" x2="22" y2="9"></line>
              <circle cx="6" cy="6" r="1" fill="currentColor"></circle>
              <circle cx="10" cy="6" r="1" fill="currentColor"></circle>
              <circle cx="14" cy="6" r="1" fill="currentColor"></circle>
            </svg>
          </button>
          <div class="dropdown">
            <button id="historyButton" type="button" title="Browse previous chat sessions">
              <span class="btn-text">History</span>
            </button>
            <div id="historyDropdown" class="dropdown-content">
              <div id="historyListDropdown" class="history-list">
                <!-- Sessions will be populated here -->
              </div>
            </div>
          </div>
          <button id="newChatButton" type="button" title="Clear current chat">
            <span class="btn-text">New Chat</span>
          </button>
          
          <div class="dropdown more-actions">
            <button id="moreActionsButton" type="button" title="More Actions">
              <span>⋮</span>
            </button>
            <div id="moreActionsDropdown" class="dropdown-content">
              <button id="moreHistoryButton" type="button">History</button>
              <button id="moreBrowserButton" type="button">Browser</button>
              <button id="moreQuotaButton" type="button">Quota</button>
              <button id="moreNewChatButton" type="button">New Chat</button>
            </div>
          </div>
        </div>
      </div>
      <div id="historyView" class="history-view">
        <div class="history-header">
          <div id="historyQuotas" class="history-quota-table">
            <div class="quota-title">Model usage left</div>
            <div id="quotaRows" class="quota-rows">
              <!-- Quota rows will be populated here -->
            </div>
          </div>
          <div class="header-top">
            <h2>Recent Sessions</h2>
            <button id="historyNewChatButton" type="button" class="primary-btn">
              <span>+ New Chat</span>
            </button>
          </div>
        </div>
        <div id="historyListFull" class="history-list">
          <!-- Sessions will be populated here -->
        </div>
      </div>
      <div class="terminal-container">
        <div id="terminal" class="terminal" aria-label="Gemini CLI"></div>
        <div id="suggestionBar" class="suggestion-bar">
          <div class="footer-left">
            <button id="addFileFooter" type="button" class="files-btn" title="Add files to chat">
              <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M10.854 4.146a.5.5 0 1 0-.708-.708L5.146 8.438a2.5 2.5 0 1 0 3.536 3.536l4.95-4.95a4 4 0 1 0-5.657-5.657L3.025 6.313a5.5 5.5 0 1 0 7.778 7.778l4.243-4.243a.5.5 0 0 0-.708-.708L10.1 13.384a4.5 4.5 0 1 1-6.364-6.364l4.95-4.95a3 3 0 1 1 4.243 4.243l-4.95 4.95a1.5 1.5 0 1 1-2.122-2.122l4.947-4.945z"/></svg>
            </button>
            
            <div id="footerMoreDropdown" class="dropup footer-more-container">
              <button id="footerMoreBtn" type="button" class="plus-btn" title="More options">
                <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>
              </button>
              <div id="footerMoreMenu" class="dropdown-content">
                <button id="moreAddFile" type="button">
                  <div class="opt-content">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M10.854 4.146a.5.5 0 1 0-.708-.708L5.146 8.438a2.5 2.5 0 1 0 3.536 3.536l4.95-4.95a4 4 0 1 0-5.657-5.657L3.025 6.313a5.5 5.5 0 1 0 7.778 7.778l4.243-4.243a.5.5 0 0 0-.708-.708L10.1 13.384a4.5 4.5 0 1 1-6.364-6.364l4.95-4.95a3 3 0 1 1 4.243 4.243l-4.95 4.95a1.5 1.5 0 1 1-2.122-2.122l4.947-4.945z"/></svg>
                    Add File
                  </div>
                </button>
                <button id="moreModels" type="button">
                  <div class="opt-content">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 8.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5zM13.5 1a.5.5 0 0 1 .5.5V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V1.5a.5.5 0 0 1 .5-.5h11zM3 14h10V2H3v12z"/></svg>
                    Models
                  </div>
                </button>
                <button id="morePermissions" type="button">
                  <div class="opt-content">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0L1 3v5c0 4.4 3.1 8.5 7 10 3.9-1.5 7-5.6 7-10V3L8 0zm0 14.5c-2.8-1.2-5-4.5-5-7.5V4.2l5-2.2 5 2.2V7c0 3-2.2 6.3-5 7.5z"/></svg>
                    Permissions
                  </div>
                </button>
              </div>
            </div>

            <div id="permissionDropdown" class="dropup permission-container">
              <button id="permissionBtn" type="button" class="permission-btn" title="Set permission level">
                <span id="permissionIcon"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="margin-right: 4px;"><path d="M8 0L1 3v5c0 4.4 3.1 8.5 7 10 3.9-1.5 7-5.6 7-10V3L8 0zm0 14.5c-2.8-1.2-5-4.5-5-7.5V4.2l5-2.2 5 2.2V7c0 3-2.2 6.3-5 7.5z"/></svg></span>
                <span id="permissionLabel">DEFAULT PERMISSION</span>
                <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor" style="margin-left: 4px; opacity: 0.6;"><path d="M8 4.5l-5 5h10l-5-5z"/></svg>
              </button>
              <div id="permissionMenu" class="dropdown-content">
                <button type="button" data-label="DEFAULT PERMISSION">
                  <div class="opt-content">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0L1 3v5c0 4.4 3.1 8.5 7 10 3.9-1.5 7-5.6 7-10V3L8 0zm0 14.5c-2.8-1.2-5-4.5-5-7.5V4.2l5-2.2 5 2.2V7c0 3-2.2 6.3-5 7.5z"/></svg>
                    Default permission
                  </div>
                </button>
                <button type="button" data-label="AUTO-REVIEW">
                  <div class="opt-content">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 8s3-5.5 6.5-5.5S14.5 8 14.5 8s-3 5.5-6.5 5.5S1.5 8 1.5 8zM8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/></svg>
                    Auto-review 
                  </div>
                  <span class="shortcut">Shift+Tab</span>
                </button>
                <button type="button" data-label="PLAN MODE">
                  <div class="opt-content">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3 4.5h10M3 8h10M3 11.5h10M1.5 4.5h.5M1.5 8h.5M1.5 11.5h.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    Plan mode 
                  </div>
                  <span class="shortcut">Shift+Tab x2</span>
                </button>
                <button type="button" data-label="FULL ACCESS">
                  <div class="opt-content">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M9.5 0L3.5 8h4l-1 8L12.5 8h-4l1-8z"/></svg>
                    Full access 
                  </div>
                  <span class="shortcut">Ctrl+Y</span>
                </button>
              </div>
            </div>

            <div id="modelsDropdown" class="dropup models-container">
              <button id="modelsBtn" type="button" class="models-btn" title="Select model">
                <span id="modelsLabel">MODELS</span>
                <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor" style="margin-left: 4px; opacity: 0.6;"><path d="M8 4.5l-5 5h10l-5-5z"/></svg>
              </button>
              <div id="modelsMenu" class="dropdown-content">
                <!-- Models will be populated here -->
              </div>
            </div>
          </div>
          <div id="suggestionControls" class="suggestion-controls">
            <div class="arrow-stack">
              <button id="suggestionUp" type="button" title="Move selection up">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4.5l-5 5h10l-5-5z"/></svg>
              </button>
              <button id="suggestionDown" type="button" title="Move selection down">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 11.5l5-5H3l5 5z"/></svg>
              </button>
            </div>
            <button id="suggestionYes" type="button" class="yes-btn" title="Select suggestion">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="margin-right: 4px;"><path d="M14.5 3a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5H5a.5.5 0 0 1-.5-.5V10a.5.5 0 0 1 1 0v2h8V4h-8v2a.5.5 0 0 1-1 0V3.5a.5.5 0 0 1 .5-.5h9zM2.354 7.646a.5.5 0 0 0 0 .708l2 2a.5.5 0 0 0 .708-.708L3.707 8.5H8.5a.5.5 0 0 0 0-1H3.707l1.355-1.354a.5.5 0 1 0-.708-.708l-2 2z"/></svg>
              <span>ENTER</span>
            </button>
          </div>
        </div>
      </div>
    </main>
    <script nonce="{{nonce}}" src="{{xtermJsUri}}"></script>
    <script nonce="{{nonce}}" src="{{fitAddonJsUri}}"></script>
    <script nonce="{{nonce}}" src="{{webLinksAddonJsUri}}"></script>
    <script nonce="{{nonce}}" src="{{mainJsUri}}"></script>
  </body>
</html>
