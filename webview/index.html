<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src {{cspSource}} https: data:; style-src {{cspSource}} 'unsafe-inline'; font-src {{cspSource}}; script-src 'nonce-{{nonce}}';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link nonce="{{nonce}}" rel="stylesheet" href="{{xtermCssUri}}" />
    <link nonce="{{nonce}}" rel="stylesheet" href="{{stylesUri}}" />
    <title>Gemini CLI UI</title>
  </head>
  <body data-platform="{{platform}}">
    <main class="terminal-shell">
      <div class="toolbar" role="toolbar" aria-label="Gemini CLI controls">
        <div class="status" id="statusContainer">
          <span class="status-dot" aria-hidden="true"></span>
          <div class="spinner" aria-hidden="true"></div>
          <span id="statusText">Starting Gemini CLI</span>
        </div>
        <div class="actions">
          <div class="dropdown">
            <button id="historyButton" type="button" title="Browse previous chat sessions">
              <span class="btn-text">History</span>
            </button>
            <div id="historyDropdown" class="dropdown-content">
              <!-- Sessions will be populated here -->
            </div>
          </div>
          <button id="browserButton" type="button" title="Switch to Gemini Browser">
            <span class="btn-text">Browser</span>
          </button>
          <button id="newChatButton" type="button" title="Start a fresh Gemini CLI session">
            <span class="btn-text">New Chat</span>
          </button>
        </div>
      </div>
      <div id="terminal" class="terminal" aria-label="Gemini CLI"></div>
    </main>
    <script nonce="{{nonce}}" src="{{xtermJsUri}}"></script>
    <script nonce="{{nonce}}" src="{{fitAddonJsUri}}"></script>
    <script nonce="{{nonce}}" src="{{webLinksAddonJsUri}}"></script>
    <script nonce="{{nonce}}" src="{{mainJsUri}}"></script>
  </body>
</html>
